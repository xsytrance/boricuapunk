<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0508"/>
      <stop offset="100%" style="stop-color:#0a0a0c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#7f1d1d;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#7f1d1d;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="n" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="overlay" opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="520" fill="url(#bg)"/>
  <g filter="url(#n)">
    <ellipse cx="200" cy="120" rx="95" ry="110" fill="#0f172a" stroke="url(#glow)" stroke-width="4"/>
    <rect x="115" y="210" width="170" height="240" rx="12" fill="#111827" stroke="#9a3412" stroke-width="3"/>
    <path d="M140 250 L260 250 M150 290 L250 290 M145 330 L255 330" stroke="#c2410c" stroke-width="6" stroke-linecap="square" opacity="0.7"/>
    <circle cx="165" cy="165" r="18" fill="#f97316" opacity="0.85"/>
    <circle cx="235" cy="165" r="18" fill="#f97316" opacity="0.85"/>
    <rect x="175" y="195" width="50" height="8" fill="#7f1d1d"/>
  </g>
</svg>
